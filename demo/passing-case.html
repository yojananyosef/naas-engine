<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>NAAS – Passing Case (Perfect Hierarchy)</title>
    <link rel="stylesheet" href="../naas-core.css" />
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #FAFAFA;
        }

        .pricing-card {
            width: 350px;
            background: white;
            border: 2px solid #000;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 8px 8px 0 #000;
            text-align: center;
        }

        #success-toast {
            position: fixed;
            top: 20px;
            background: #000;
            color: #fff;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 14px;
            transform: translateY(-100px);
            transition: 0.3s;
        }
    </style>
</head>

<body>

    <div id="success-toast">CDV Optimized ✓</div>

    <article class="pricing-card">
        <div data-aida="attention">
            <span
                style="text-transform: uppercase; font-weight: 800; font-size: 0.75rem; letter-spacing: 0.1em; color: #4F46E5;">Pro
                Plan</span>
            <h2 style="font-size: 2.5rem; margin: 10px 0;">$29<span style="font-size: 1rem;">/mo</span></h2>
        </div>

        <p data-aida="interest" style="color: #666; margin-bottom: 25px;">
            Perfect for teams that need mathematical precision.
        </p>

        <div data-aida="desire" style="text-align: left; margin-bottom: 30px; font-size: 0.9rem;">
            <div>✓ Unlimited CDV Checks</div>
            <div>✓ 24/7 Cognitive Support</div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 12px;">
            <button data-aida="action" data-cta="primary">Choose Pro</button>
            <button data-aida="action" data-cta="secondary"
                style="border:none; box-shadow:none; background:transparent;">Back to free</button>
        </div>
    </article>

    <script type="module">
        import { NAASEngine } from '../naas-engine.js';
        const toast = document.getElementById('success-toast');

        const engine = new NAASEngine({
            onEvaluate: r => {
                if (r.invariantHolds) {
                    toast.style.transform = 'translateY(0)';
                } else {
                    toast.style.transform = 'translateY(-100px)';
                }
                console.log("Hierarchy Score:", r.primary);
            }
        });
        engine.start();
    </script>
</body>

</html>
