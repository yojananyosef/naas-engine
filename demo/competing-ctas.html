<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>NAAS – Competing CTAs (Failure Case)</title>
    <link rel="stylesheet" href="../naas-core.css" />
    <style>
        body {
            padding: 60px;
            background: #f0f0f0;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border: 2px solid #000;
            padding: 40px;
            border-radius: 12px;
        }

        /* BOTÓN INTRUSO: Diseñado para "robar" el CDV */
        .danger-cta {
            background: #ff4444 !important;
            color: white !important;
            padding: 30px 50px !important;
            /* Superficie masiva */
            font-size: 24px !important;
            /* Masa tipográfica alta */
            font-weight: 900 !important;
            border: 4px solid black !important;
            margin-top: 20px;
        }

        #violation-report {
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            font-family: monospace;
            border: 2px solid #000;
        }
    </style>
</head>

<body>

    <div class="container">
        <header data-aida="attention">
            <h1 style="margin-bottom: 10px;">Security Alert</h1>
        </header>

        <p data-aida="interest" style="margin-bottom: 30px;">
            A secondary element is competing with your primary goal.
        </p>

        <div style="display: flex; flex-direction: column; gap: 15px; align-items: center;">
            <!-- El Primary oficial -->
            <button data-aida="action" data-cta="primary">
                Secure Account Now
            </button>

            <!-- El intruso que rompe el CDV -->
            <button data-aida="action" class="danger-cta">
                DELETE EVERYTHING
            </button>
        </div>
    </div>

    <!-- Dashboard de Diagnóstico -->
    <div id="violation-report">Analizando jerarquía...</div>

    <script type="module">
        import { NAASEngine } from '../naas-engine.js';
        const report = document.getElementById('violation-report');

        const engine = new NAASEngine({
            deltaThreshold: 0.1, // Margen de seguridad estricto
            onEvaluate: r => {
                const color = r.invariantHolds ? '#16a34a' : '#dc2626';
                report.style.backgroundColor = r.invariantHolds ? '#f0fdf4' : '#fef2f2';
                report.style.borderColor = color;

                report.innerHTML = `
                    <b style="color: ${color}">Result: ${r.invariantHolds ? 'NORMAL' : 'HIERARCHY VIOLATION'}</b><br>
                    <small>The "Delete" button has too much visual mass compared to the Primary CTA.</small><hr>
                    Margin: ${r.margin.toFixed(3)} (Min required: 0.100)
                `;
            }
        });
        engine.start();
    </script>
</body>

</html>
